<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset='utf-8' />
  <meta name="viewport" content="width=device-width" />
  <title>スタイル</title>
  <style>
    strong {
        color:blue;
    }
  </style>
</head>

<body>
  <p>
    空を見れば<strong>雲</strong>、遠くを見ても<strong>雲</strong>。白い<strong>雲</strong>、薄い<strong>雲</strong>、大きな<strong>雲</strong>。今日は<strong>雲</strong>ばかり眺めて、<strong>雲</strong>の形を楽しんだ。
  </p>
</body>

</html>
